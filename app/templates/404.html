<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 هذه الصفحة غير موجودة</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      font-family: "Noto Kufi Arabic", "Cairo", "Tajawal", "Segoe UI", Tahoma, sans-serif;
      background: #ffffff;
      color: #111827;
    }
    .box {
      text-align: center;
      width: min(92vw, 680px);
      padding: clamp(20px, 4vw, 36px);
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.07);
      background: #ffffff;
    }
    h1 {
      margin: 0;
      line-height: 1.5;
      font-size: clamp(22px, 4.2vw, 38px);
      font-weight: 700;
      letter-spacing: 0;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404 هذه الصفحة غير موجودة</h1>
  </div>
  <script>
    setTimeout(function () { window.location.href = "/"; }, 3000);
  </script>
</body>
</html>
