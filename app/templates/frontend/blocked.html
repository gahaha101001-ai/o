<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>محاولات كثيرة</title>
  <style>
    @font-face {
      font-family: "Cairo";
      src: url("{{ url_for('static', path='frontend/fonts/cairo/Cairo-Regular.ttf') }}") format("truetype");
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: "Cairo";
      src: url("{{ url_for('static', path='frontend/fonts/cairo/Cairo-SemiBold.ttf') }}") format("truetype");
      font-weight: 600;
      font-style: normal;
    }

    @font-face {
      font-family: "Cairo";
      src: url("{{ url_for('static', path='frontend/fonts/cairo/Cairo-Bold.ttf') }}") format("truetype");
      font-weight: 700;
      font-style: normal;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Cairo", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      color: #334155;
      text-align: center;
    }

    .blocked-card {
      width: min(100%, 420px);
      padding: 32px 24px;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 24px 56px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(226, 232, 240, 0.95);
    }

    .blocked-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #fee2e2;
      color: #b91c1c;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .blocked-title {
      margin: 0 0 10px;
      font-size: 1.35rem;
      font-weight: 700;
      color: #1e293b;
    }

    .blocked-copy {
      margin: 0;
      font-size: 0.96rem;
      line-height: 1.9;
      color: #64748b;
    }

    .blocked-actions {
      margin-top: 22px;
      display: flex;
      justify-content: center;
    }

    .blocked-whatsapp-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 210px;
      padding: 12px 18px;
      border-radius: 14px;
      background: #25d366;
      color: #ffffff;
      text-decoration: none;
      font-size: 0.96rem;
      font-weight: 700;
      box-shadow: 0 14px 30px rgba(37, 211, 102, 0.22);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .blocked-whatsapp-btn:hover {
      transform: translateY(-1px);
      background: #1ebe5d;
      box-shadow: 0 18px 34px rgba(37, 211, 102, 0.28);
    }

    .blocked-whatsapp-btn:focus-visible {
      outline: 3px solid rgba(37, 211, 102, 0.24);
      outline-offset: 3px;
    }

    .blocked-whatsapp-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
  </style>
</head>
<body data-heartbeat-interval-ms="{{ heartbeat_interval_seconds * 1000 }}">
  <section class="blocked-card">
    <div class="blocked-icon">!</div>
    <h1 class="blocked-title">محاولات كثيرة</h1>
    <p class="blocked-copy">لقد تجاوزت عدد المحاولات المسموح بها. يرجى المحاولة مرة أخرى لاحقًا.</p>
    {% if support_whatsapp_url %}
    <div class="blocked-actions">
      <a
        class="blocked-whatsapp-btn"
        href="{{ support_whatsapp_url }}"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="تواصل معنا عبر واتساب"
      >
        <svg class="blocked-whatsapp-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none">
          <path d="M12 2.25a9.75 9.75 0 0 0-8.385 14.73L2.25 21.75l4.902-1.287A9.75 9.75 0 1 0 12 2.25Z" fill="currentColor" fill-opacity="0.16"></path>
          <path d="M9.114 7.447c-.24-.536-.493-.547-.72-.556l-.613-.01c-.21 0-.552.079-.84.395-.289.316-1.103 1.078-1.103 2.63 0 1.553 1.13 3.054 1.287 3.264.158.21 2.18 3.493 5.384 4.754 2.66 1.047 3.203.84 3.78.79.578-.053 1.867-.763 2.13-1.5.263-.738.263-1.37.184-1.5-.079-.132-.29-.21-.605-.37-.316-.157-1.867-.92-2.155-1.025-.289-.104-.5-.157-.71.158-.21.315-.815 1.025-1 1.235-.184.21-.368.237-.684.079-.315-.158-1.33-.49-2.534-1.56-.937-.835-1.57-1.865-1.754-2.18-.185-.316-.02-.487.138-.644.142-.143.315-.369.473-.553.158-.184.21-.315.315-.526.105-.21.053-.394-.026-.552-.079-.157-.694-1.735-.977-2.367Z" fill="currentColor"></path>
        </svg>
        <span>تواصل معنا عبر واتساب</span>
      </a>
    </div>
    {% endif %}
  </section>

  <script src="{{ url_for('static', path='frontend/js/main.js') }}?v=20260315-2"></script>
</body>
</html>
