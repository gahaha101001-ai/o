services:
  - type: web
    name: fastapi-base
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: APP_NAME
        value: FastAPI Base
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: fastapi_base
      - key: MONGO_SUBMISSIONS_COLLECTION
        value: submissions
      - key: MONGO_VISITORS_COLLECTION
        value: visitors
      - key: MONGO_SETTINGS_COLLECTION
        value: settings
      - key: SUPPORT_WHATSAPP_NUMBER
        sync: false
      - key: ONLINE_USERS_KEY
        value: fastapi-base:online-users
      - key: ONLINE_USER_TTL_SECONDS
        value: "5"
      - key: ONLINE_HEARTBEAT_INTERVAL_SECONDS
        value: "2"
      - key: ONLINE_PRESENCE_BROADCAST_INTERVAL_SECONDS
        value: "1"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: fastapi-base-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: keyvalue
    name: fastapi-base-redis
    plan: free
